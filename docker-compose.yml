services:
  db:
    image: mysql:latest
    container_name: mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password01admin}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-psru_booking}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST:-%}
    volumes:
      - db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: psru-backend
    env_file:
      - ./back-end/.env
    volumes:
      - ./back-end/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        VITE_API: /api
    container_name: psru-frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: psru-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db: {}